<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tous les utilisateurs</title>

<style>

body{
    background:#f4f6f9;
    font-family:'Segoe UI',sans-serif;
    margin:0;
}

.container{
    width:90%;
    margin:30px auto;
}

h1{
    text-align:center;
    color:#2e7d32;
    margin-bottom:25px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}
th{
    background:#2e7d32;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

tr:hover{
    background:#f8f8f8;
}

.retour{
    display:block;
    width:200px;
    margin:25px auto;
    text-align:center;
    background:#c1121f;
    color:white;
    text-decoration:none;
    padding:12px;
    border-radius:8px;
     font-weight:bold;
}

.retour:hover{
    background:#a50f1a;
}

</style>

</head>

<body>

<div class="container">

<h1>Liste complète des utilisateurs</h1>

<table>

<tr>
    <th>Nom et Prénom</th>
    <th>Matricule</th>
    <th>Service</th>
</tr>

{% for u in utilisateurs %}
<tr>

    <td>{{ u[0] }}</td>
    <td>{{ u[1] }}</td>
    <td>{{ u[2] }}</td>

</tr>

{% endfor %}

</table>

<a href="/accueil" class="retour">
    ⬅ Retour à l'accueil
</a>

</div>

</body>
</html>
